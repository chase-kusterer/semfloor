{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SEM Trading Floor{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'game/floor.css' %}">
</head>
<body>
  <header class="topbar">
    <span class="brand">SEM Trading Floor</span>
    {% block topbar_extra %}{% endblock %}
  </header>

  {% if messages %}
    <ul class="messages">
      {% for m in messages %}<li class="msg {{ m.tags }}">{{ m }}</li>{% endfor %}
    </ul>
  {% endif %}

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'game/poll.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
